            // Detect browser language and find best match
            function detectLanguage() {
                var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
                for (var i = 0; i < langs.length; i++) {
                    var lang = langs[i].toLowerCase();
                    // Try exact match (e.g. "pt-br" -> "pt")
                    var base = lang.split('-')[0];
                    // Hebrew: browser uses "he", Android uses "iw"
                    if (base === 'he') base = 'iw';
                    // Norwegian: browser may use "no"
                    if (base === 'no') base = 'nb';
                    if (translations[base]) return base;
                }
                return 'en';
            }

            var lang = detectLanguage();
            var t = translations[lang];

            // Apply translations
            document.title = t.title;
            document.documentElement.lang = lang === 'iw' ? 'he' : lang;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('status').textContent = t.opening;
            document.getElementById('store-btn').textContent = t.storeBtn;

            // Set RTL for Arabic, Persian, Hebrew
            if (lang === 'ar' || lang === 'fa' || lang === 'iw') {
                document.documentElement.dir = 'rtl';
            }

            // Update Google Play badge to localized version
            var badgeImg = document.getElementById('play-badge-img');
            badgeImg.alt = t.badgeAlt;
            badgeImg.src = 'https://play.google.com/intl/' + t.playLocale + '/badges/static/images/badges/' + t.playBadge + '_badge_web_generic.png';

            var path = window.location.pathname;
            // Match /radiora/station/{uuid} or /station/{uuid}
            var match = path.match(/\/station\/([0-9a-f-]+)/i);
            if (!match) {
                document.getElementById('status').textContent = t.noStation;
                document.getElementById('store-btn').style.display = 'inline-block';
                return;
            }
            var uuid = match[1];
            var deepLink = 'radiora://station/' + uuid;

            // Try to open the app via custom scheme
            var start = Date.now();
            window.location.href = deepLink;

            // If the app didn't open after 1.5s, show the store button
            setTimeout(function() {
                if (Date.now() - start < 2000) return; // App opened, page was backgrounded
                document.getElementById('status').textContent = t.fallback;
                document.getElementById('store-btn').style.display = 'inline-block';
            }, 1500);
        })();
