<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiora - Open Station</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); margin-bottom: 24px; }
        .status { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #d63851; }
        .secondary {
            display: block;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-decoration: none;
        }
        .secondary:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📻</div>
        <h1>Radiora</h1>
        <p class="subtitle">Free Internet Radio</p>
        <p id="status" class="status">Opening station in the app...</p>
        <a id="store-btn" class="btn" href="https://play.google.com/store/apps/details?id=com.radiora.app" style="display:none;">
            Get Radiora on Google Play
        </a>
        <a class="secondary" href="https://play.google.com/store/apps/details?id=com.radiora.app">
            Download on Google Play
        </a>
    </div>
    <script>
        (function() {
            var path = window.location.pathname;
            // Match /radiora/station/{uuid} or /station/{uuid}
            var match = path.match(/\/station\/([0-9a-f-]+)/i);
            if (!match) {
                document.getElementById('status').textContent = 'No station specified.';
                document.getElementById('store-btn').style.display = 'inline-block';
                return;
            }
            var uuid = match[1];
            var deepLink = 'radiora://station/' + uuid;

            // Try to open the app via custom scheme
            var start = Date.now();
            window.location.href = deepLink;

            // If the app didn't open after 1.5s, show the store button
            setTimeout(function() {
                if (Date.now() - start < 2000) return; // App opened, page was backgrounded
                document.getElementById('status').textContent =
                    "Couldn't open the app. Get Radiora to listen:";
                document.getElementById('store-btn').style.display = 'inline-block';
            }, 1500);
        })();
    </script>
</body>
</html>
